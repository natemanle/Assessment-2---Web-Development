<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terraria Class Guide</title>
    <link rel="stylesheet" href="classes.css">
</head>

<body>
    <div id="loading-overlay">
    <div class="dash-effect"></div>
    <img src="images/Ambience_EOC.jpg" alt="Loading" class="loading-eye">
</div>

    <nav>
    <div class="nav-container">
        <a href="Mainpage.html" class="nav-logo">
            <img src="images/Terrarialogo.jpg" alt="Terraria Logo">
        </a>

        <ul class="nav-links">
            <li><a href="Mainpage.html">Home</a></li>
            <li><a href="#classes">Classes</a></li> <li><a href="reviews.html">Reviews</a></li>
        </ul>
    </div>
</nav>

    <header>
        <h1>Choose Your Path</h1>
        <p>Select a class to see the best setup till late-game.</p>
    </header>

    <main class="class-container">
        <section class="card melee">
            <div class="class-info">
                <h2>Melee</h2>
                <div class="button-wrapper">
                    <span class="icon left"><img src="images/Zenith.jpg" alt="Zenith"></span>
                    <a href="melee.html" class="btn">View Loadout</a>
                    <span class="icon right"><img src="images/Solar_Eruption.jpg" alt="Solar Eruption"></span>
                </div>
            </div>
            <img src="images/Solar_Flare_armor.webp" alt="Melee Armor" class="armor-sprite">
        </section>

        <section class="card ranger">
            <div class="class-info">
                <h2>Ranger</h2>
                <div class="button-wrapper">
                    <span class="icon left"><img src="images/Phantasm.jpg" alt="Phantasm"></span>
                    <a href="range.html" class="btn">View Loadout</a>
                    <span class="icon right"><img src="images/S.D.M.G..jpg" alt="S.D.M.G."></span>
                </div>
            </div>
            <img src="images/Vortex_armor.webp" alt="Ranger Armor" class="armor-sprite">
        </section>

        <section class="card mage">
            <div class="class-info">
                <h2>Mage</h2>
                <div class="button-wrapper">
                    <span class="icon left"><img src="images/Last_Prism.jpg" alt="Last Prism"></span>
                    <a href="mage.html" class="btn">View Loadout</a>
                    <span class="icon right"><img src="images/Nebula_Arcanum.jpg" alt="Nebula Arcanum"></span>
                </div>
            </div>
            <img src="images/Nebula_armor.webp" alt="Mage Armor" class="armor-sprite">
        </section>

        <section class="card summoner">
            <div class="class-info">
                <h2>Summoner</h2>
                <div class="button-wrapper">
                    <span class="icon left"><img src="images/Stardust_Dragon_Staff.jpg" alt="Terra Prisma"></span>
                    <a href="summoner.html" class="btn">View Loadout</a>
                    <span class="icon right"><img src="images/Possession.jpg" alt="Kaleidoscope"></span>
                </div>
            </div>
            <img src="images/Stardust_armor.webp" alt="Summoner Armor" class="armor-sprite">
        </section>
    </main>

    <script src="classes.js"></script>
</body>
</html>
